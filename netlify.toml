[build]
  base = "frontend/frozen-ui"
  command = "npm install && VITE_APP_BUILD=$(date -u +%Y-%m-%d) npm run build"
  publish = "dist"

# Environment variables should be set in Netlify Dashboard:
# 1. Go to Site settings → Environment variables
# 2. Add: VITE_API_BASE_URL = https://your-backend-url/api
# 3. Redeploy after setting environment variables

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
